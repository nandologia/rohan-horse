name = edoras_horse
title = Edoras Horse
description = Standalone larger-breed horse mob for Mineclonia. Rideable, with four-tier walk/trot/canter/gallop gaits, per-horse speed genetics, hunger/thirst needs with head-down grazing and drinking, a canter flee when struck, saddle/armor/saddlebag tack, and natural Plains/Savanna spawning. Uses the PKZ Horse Rig coats on an upscaled canonical horse mesh.
